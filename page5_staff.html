 <link rel="stylesheet" href="style.css"> <!-- This connects the page to the CSS file to control the design --></head>

<!-- Main content -->
<div class="container"> <!-- This holds the main content in the middle of the page -->
    <h2>Staff Database Search</h2> <!-- Smaller heading for this section -->

<form action="staff_search.php" method="GET"> <!-- When the user clicks Search, data is sent to staff_search.php using GET method -->


  <div class="form-row"> <!-- This is one row of the form -->
    <label>School Name</label> <!-- Text label telling the user what to choose -->
<select name="SchoolName"> <!-- Dropdown list. The selected value will be called SchoolName -->
    <option value="">-- Any --</option> <!-- Default option (means no filter) -->
    <option value="Marshfield School">Marshfield School</option> <!-- Option 1 -->
    <option value="Thornton Lane Board School">Thornton Lane Board School</option> <!-- Option 2 -->
    <option value="Chapel Green Board School">Chapel Green Board School</option> <!-- Option 3 -->
</select>

  </div>

  <div class="form-row"> <!-- Another row in the form -->
    <label>Department</label> <!-- Label text -->
    <select name="Dept"> <!-- Dropdown. The selected value will be called Dept -->
      <option value="">-- Any --</option> <!-- Default option -->
      <option value="Junior">Junior</option> <!-- Option -->
      <option value="Infant">Infant</option> <!-- Option -->
      <option value="Admin">Admin</option> <!-- Option -->
    </select>
  </div>

  <div class="form-row"> <!-- Another row -->
    <label>Last Name</label> <!-- Label -->
    <input type="text" name="LastName"> <!-- Text box where user types a last name -->
  </div>

  <div class="form-row"> <!-- Another row -->
    <label>Position</label> <!-- Label -->
    <select name="Position"> <!-- Dropdown. The selected value will be called Position -->
    <option value="">-- Any --</option> <!-- Default option -->
    <option value="Head Mistress">Head Mistress</option> <!-- Option -->
    <option value="Assistant Mistress">Assistant Mistress</option> <!-- Option -->
    <option value="Monitor">Monitor</option> <!-- Option -->
    <option value="Candidate">Candidate</option> <!-- Option -->
</select>

  </div>

  <div class="form-row"> <!-- Another row -->
    <label>Start Year</label> <!-- Label -->
    <input type="text" name="StartYear"> <!-- Text box where user types a year -->
  </div>

  <div class="form-row"> <!-- Last row -->
    <button type="submit">Search</button> <!-- This button sends the form data to staff_search.php -->
  </div>

</form>

</div>

<!-- Footer -->
<div class="footer"> <!-- Bottom section of the page -->
    Community History Research by Ray Greenhough <!-- Text shown at the bottom -->
</div>
