<div class="container"> <!-- Main content section in the middle of the page -->
  <h2>Sources Database Search</h2> <!-- Smaller heading for this page -->

  <form action="sources_search.php" method="GET"> <!-- When user clicks Search, the data is sent to sources_search.php using GET method -->

    <div class="form-row"> <!-- First row of the form -->
      <label>School</label> <!-- Label telling the user what this dropdown is for -->
      <select name="School"> <!-- Dropdown list. The selected value will be called "School" -->
        <option value="">-- Any --</option> <!-- Default option (means no filter) -->
        <option value="Marshfield School">Marshfield School</option> <!-- Option 1 -->
        <option value="Thornton Lane Board School">Thornton Lane Board School</option> <!-- Option 2 -->
        <option value="Chapel Green Board School">Chapel Green Board School</option> <!-- Option 3 -->
      </select>
    </div>

    <div class="form-row"> <!-- Second row of the form -->
      <label>Source type</label> <!-- Label for the dropdown -->
      <select name="SourceType"> <!-- Dropdown. The selected value will be called "SourceType" -->
        <option value="">-- Any --</option> <!-- Default option -->
        <option value="Log Book">Log Book</option> <!-- Option -->
        <option value="Admission Register">Admission Register</option> <!-- Option -->
        <option value="Document">Document</option> <!-- Option -->
        <option value="Booklet">Booklet</option> <!-- Option -->
      </select>
    </div>

    <div class="form-row"> <!-- Final row -->
      <button type="submit">Search</button> <!-- This button sends the form data to sources_search.php -->
    </div>

  </form>
</div>
